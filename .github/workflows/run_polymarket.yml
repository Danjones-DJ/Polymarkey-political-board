name: Run Polymarket Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      GSHEET_AUTH_JSON: ${{ secrets.GSHEET_AUTH_JSON }}

    steps:
      - name: Get repo files
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::jsonlite
            any::tidyverse
            any::lubridate
            any::purrr
            any::glue
            any::googlesheets4
            any::googledrive

      - name: Run scraper
        run: Rscript run_all.R
