name: Run Polymarket Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      GSHEET_AUTH_JSON: ${{ secrets.GSHEET_AUTH_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages("pacman", repos = "https://cloud.r-project.org")'
          Rscript -e 'pacman::p_load(httr2, jsonlite, tidyverse, lubridate, purrr, glue, googlesheets4, googledrive)'

      - name: Run scraper
        run: Rscript run_all.R
